<main class="flex-grow container max-w-md mx-auto px-container-margin py-8 flex flex-col">

            </p>

<div class="space-y-4 mb-12">
<!-- Checklist Item 1 -->

<input checked="" class="hidden checkbox-custom" id="psa_birth" type="checkbox"/>
<label class="flex items-center p-5 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm cursor-pointer hover:border-primary/30 hover:shadow-md transition-all active:scale-[0.98]" for="psa_birth">
<div class="check-box w-6 h-6 rounded-md border-2 border-outline-variant flex items-center justify-center mr-4 transition-colors">
<span class="material-symbols-outlined text-white text-sm hidden">check</span>
</div>
<div class="flex-grow">
<span class="font-headline-sm text-headline-sm block">PSA Birth Certificate</span>
<span class="font-label-md text-label-md text-on-surface-variant">Original or Certified True Copy</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40">description</span>
</label>
</div>
<!-- Checklist Item 2 -->
<div class="relative">
<input class="hidden checkbox-custom" id="form_138" type="checkbox"/>

<div class="check-box w-6 h-6 rounded-md border-2 border-outline-variant flex items-center justify-center mr-4 transition-colors">
<span class="material-symbols-outlined text-white text-sm hidden">check</span>
</div>
<div class="flex-grow">
<span class="font-headline-sm text-headline-sm block">Form 138 (Report Card)</span>
<span class="font-label-md text-label-md text-on-surface-variant">Final grades from previous year</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40">school</span>
</label>
</div>
<!-- Checklist Item 3 -->

</div>
<div class="flex-grow">

<span class="font-label-md text-label-md text-on-surface-variant">Proof of household income</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40">payments</span>
</label>
</div>
<!-- Checklist Item 4 -->
<div class="relative">
<input class="hidden checkbox-custom" id="good_moral" type="checkbox"/>
<label class="flex items-center p-5 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm cursor-pointer hover:border-primary/30 hover:shadow-md transition-all active:scale-[0.98]" for="good_moral">

<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-5">
<span class="text-white font-bold text-headline-sm">Your journey begins.</span>

<script>
        // Simple micro-interaction for checkboxes
        const checkboxes = document.querySelectorAll('.checkbox-custom');
        checkboxes.forEach(cb => {
            cb.addEventListener('change', (e) => {
                const label = e.target.nextElementSibling;
                if(e.target.checked) {
                    label.classList.add('border-primary-container', 'bg-primary/5');
                } else {
                    label.classList.remove('border-primary-container', 'bg-primary/5');
                }
            });
            // Init state
            if(cb.checked) {
                cb.nextElementSibling.classList.add('border-primary-container', 'bg-primary/5');
            }
        });
    </script>
